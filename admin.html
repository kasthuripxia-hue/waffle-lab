<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - The Waffle Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
    <script>
        if (window.location.protocol === 'file:') {
            alert("CRITICAL: You are opening this file directly. Admin features REQUIRE the server. Please run 'python app.py' and open http://localhost:5000/admin.html");
        }
    </script>
</head>

<body class="bg-[#120f0d] text-white min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white/5 border border-white/10 p-8 rounded-[2.5rem] backdrop-blur-xl shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black italic tracking-tighter mb-2">ADMIN LOGIN</h1>
            <p class="text-white/40 text-sm">Enter your credentials to manage the Lab</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-[10px] font-black uppercase tracking-widest text-[#8d5a30] mb-2">Email
                    Address</label>
                <input type="email" id="username" required
                    class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-[#8d5a30] transition-colors"
                    placeholder="name@example.com">
            </div>
            <div>
                <label
                    class="block text-[10px] font-black uppercase tracking-widest text-[#8d5a30] mb-2">Password</label>
                <input type="password" id="password" required
                    class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-[#8d5a30] transition-colors"
                    placeholder="••••••••">
            </div>

            <button type="submit"
                class="w-full py-5 bg-[#8d5a30] text-white rounded-2xl font-black text-sm shadow-xl shadow-[#8d5a30]/20 active:scale-95 transition-transform">
                ENTER LABORATORY
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="index.html"
                class="text-white/40 text-[10px] font-bold uppercase tracking-widest hover:text-white transition-colors">←
                Back to Menu</a>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('isAdmin', 'true');
                    window.location.href = 'dashboard.html';
                } else {
                    alert(data.message);
                }
            } catch (err) {
                alert('Connection failed. Make sure the server is running.');
            }
        });
    </script>
</body>

</html>
