<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - The Waffle Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_config.js"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>

<body class="bg-[#f8f7f6] text-slate-900 min-h-screen pb-24">
    <header
        class="sticky top-0 z-50 bg-white/80 backdrop-blur-md px-6 py-4 border-b border-black/5 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <a href="admin.html"
                class="flex items-center justify-center w-8 h-8 rounded-full bg-slate-100 hover:bg-slate-200 text-slate-600 transition-colors"
                title="Back to Login">
                <span class="material-symbols-outlined text-[18px]">arrow_back</span>
            </a>
            <div>
                <h1 class="text-xl font-black italic tracking-tighter">LAB DASHBOARD</h1>
                <p class="text-[10px] font-bold text-[#8d5a30] uppercase">Management Console</p>
            </div>
        </div>
        <button onclick="logout()" class="text-red-500 font-bold text-xs uppercase tracking-widest"
            data-lang="logout">Logout</button>
    </header>

    <main class="max-w-4xl mx-auto p-6">
        <!-- Tabs -->
        <div class="flex gap-6 mb-8 border-b border-black/5 pb-4">
            <button onclick="switchTab('menu')" id="tab-menu"
                class="text-sm font-black text-[#8d5a30] transition-colors relative">
                <span data-lang="menu-db">Menu Database</span>
                <div class="absolute -bottom-4 left-0 w-full h-1 bg-[#8d5a30] rounded-t-full"></div>
            </button>
            <button onclick="switchTab('orders')" id="tab-orders"
                class="text-sm font-black text-slate-400 hover:text-slate-600 transition-colors relative">
                <span data-lang="recent-orders">Recent Orders (24h)</span>
                <div class="absolute -bottom-4 left-0 w-full h-1 bg-transparent rounded-t-full"></div>
            </button>
        </div>

        <!-- Menu Section -->
        <div id="section-menu" class="block">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black">Menu Items</h2>
                <button onclick="openModal()"
                    class="bg-[#8d5a30] text-white px-6 py-3 rounded-2xl font-black text-xs shadow-lg shadow-[#8d5a30]/20 flex items-center gap-2 transition-transform active:scale-95">
                    <span class="material-symbols-outlined text-sm">add</span>
                    ADD NEW ITEM
                </button>
            </div>
            <div id="items-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Items will be injected here -->
            </div>
        </div>

        <!-- Orders Section -->
        <div id="section-orders" class="hidden">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black">Live Order Stream</h2>
                <button onclick="loadOrders()"
                    class="bg-white text-[#8d5a30] px-5 py-3 rounded-2xl shadow-sm border border-black/5 font-black text-xs flex items-center gap-2 hover:shadow-md transition-all active:scale-95">
                    <span class="material-symbols-outlined text-sm">refresh</span>
                    REFRESH
                </button>
            </div>
            <div id="orders-list" class="flex flex-col gap-4">
                <!-- Orders will be injected here -->
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="modal"
        class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-6">
        <div class="w-full max-w-lg bg-white rounded-[2.5rem] p-8 shadow-2xl relative">
            <button onclick="closeModal()"
                class="absolute top-6 right-6 text-slate-400 hover:text-slate-900 transition-colors">
                <span class="material-symbols-outlined">close</span>
            </button>

            <h3 id="modal-title" class="text-2xl font-black mb-6 italic">ADD ITEM</h3>

            <form id="item-form" class="space-y-4">
                <input type="hidden" id="edit-id">
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-[#8d5a30] mb-2">Item
                        Name</label>
                    <input type="text" id="name" required
                        class="w-full bg-[#f8f7f6] border-none rounded-2xl px-5 py-4 focus:ring-2 focus:ring-[#8d5a30]/20 transition-all font-medium">
                </div>

                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="block text-[10px] font-black uppercase tracking-widest text-[#8d5a30] mb-2">Price
                            (₹)</label>
                        <input type="number" id="price" required
                            class="w-full bg-[#f8f7f6] border-none rounded-2xl px-5 py-4 focus:ring-2 focus:ring-[#8d5a30]/20 transition-all font-medium">
                    </div>
                    <div>
                        <label
                            class="block text-[10px] font-black uppercase tracking-widest text-[#8d5a30] mb-2">Category</label>
                        <select id="category"
                            class="w-full bg-[#f8f7f6] border-none rounded-2xl px-5 py-4 focus:ring-2 focus:ring-[#8d5a30]/20 transition-all font-medium">
                            <option value="waffle">Waffle</option>
                            <option value="cake">Cake</option>
                            <option value="brownie">Brownie</option>
                        </select>
                    </div>
                    <div>
                        <label
                            class="block text-[10px] font-black uppercase tracking-widest text-[#8d5a30] mb-2">Flavor</label>
                        <select id="flavor"
                            class="w-full bg-[#f8f7f6] border-none rounded-2xl px-5 py-4 focus:ring-2 focus:ring-[#8d5a30]/20 transition-all font-medium">
                            <option value="classic">Classic</option>
                            <option value="dark">Dark</option>
                            <option value="milk">Milk</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-[#8d5a30] mb-2">Image
                        URL</label>
                    <input type="url" id="img" required
                        class="w-full bg-[#f8f7f6] border-none rounded-2xl px-5 py-4 focus:ring-2 focus:ring-[#8d5a30]/20 transition-all font-medium">
                </div>
                <div>
                    <label
                        class="block text-[10px] font-black uppercase tracking-widest text-[#8d5a30] mb-2">Description</label>
                    <textarea id="desc" required
                        class="w-full bg-[#f8f7f6] border-none rounded-2xl px-5 py-4 focus:ring-2 focus:ring-[#8d5a30]/20 transition-all font-medium h-24"></textarea>
                </div>

                <button type="submit"
                    class="w-full py-5 bg-[#8d5a30] text-white rounded-2xl font-black text-sm shadow-xl shadow-[#8d5a30]/20 active:scale-95 transition-transform mt-4">
                    SAVE CHANGES
                </button>
            </form>
        </div>
    </div>

    <script>
        if (localStorage.getItem('isAdmin') !== 'true') window.location.href = 'admin.html';

        // Supabase is initialized in supabase_config.js

        let menuItems = [];

        async function loadMenu() {
            const { data, error } = await supabaseClient
                .from('menu')
                .select('*');

            if (error) {
                console.error("Supabase error:", error);
                // Fallback to local
                const res = await fetch('/api/menu');
                menuItems = await res.json();
            } else {
                menuItems = data || [];
            }

            const grid = document.getElementById('items-grid');

            grid.innerHTML = menuItems.map((item) => `
                <div class="bg-white p-4 rounded-3xl border border-black/5 flex gap-4 items-center shadow-sm hover:shadow-md transition-shadow">
                    <img src="${item.img}" class="size-20 rounded-2xl object-cover shrink-0">
                    <div class="flex-1 min-w-0">
                        <h4 class="font-black text-sm truncate">${item.name}</h4>
                        <p class="text-[#8d5a30] font-bold text-xs">₹${item.price}</p>
                        <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">${item.category}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="openModal('${item.id}')" class="bg-blue-50 text-blue-500 size-10 rounded-xl flex items-center justify-center">
                            <span class="material-symbols-outlined text-base">edit</span>
                        </button>
                        <button onclick="deleteItem('${item.id}')" class="bg-red-50 text-red-500 size-10 rounded-xl flex items-center justify-center">
                            <span class="material-symbols-outlined text-base">delete</span>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function openModal(id = null) {
            const modal = document.getElementById('modal');
            const item = id ? menuItems.find(i => i.id === id) : null;
            modal.classList.remove('hidden');

            if (item) {
                document.getElementById('edit-id').value = item.id;
                document.getElementById('name').value = item.name;
                document.getElementById('img').value = item.img;
                document.getElementById('desc').value = item.desc;
                document.getElementById('price').value = item.price;
                document.getElementById('category').value = item.category;
                document.getElementById('flavor').value = item.flavor || 'classic';
                document.getElementById('modal-title').innerText = 'EDIT ITEM';
            } else {
                document.getElementById('item-form').reset();
                document.getElementById('edit-id').value = '';
                document.getElementById('modal-title').innerText = 'ADD ITEM';
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        document.getElementById('item-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const data = {
                id: id || 'item-' + Date.now(),
                name: document.getElementById('name').value,
                img: document.getElementById('img').value,
                desc: document.getElementById('desc').value,
                price: parseFloat(document.getElementById('price').value),
                category: document.getElementById('category').value,
                flavor: document.getElementById('flavor').value
            };

            const { error } = await supabaseClient
                .from('menu')
                .upsert(data);

            if (!error) {
                closeModal();
                loadMenu();
            } else {
                alert("Error saving item to Supabase: " + error.message);
                // Try local fallback
                const method = id ? 'PUT' : 'POST';
                const url = id ? `/api/menu/${id}` : '/api/menu';
                await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                closeModal();
                loadMenu();
            }
        });

        async function deleteItem(id) {
            if (confirm(`Are you sure you want to remove this item?`)) {
                const { error } = await supabaseClient
                    .from('menu')
                    .delete()
                    .eq('id', id);

                if (!error) {
                    loadMenu();
                } else {
                    alert("Error deleting from Supabase: " + error.message);
                    await fetch(`/api/menu/${id}`, { method: 'DELETE' });
                    loadMenu();
                }
            }
        }

        function logout() {
            localStorage.removeItem('isAdmin');
            window.location.href = 'admin.html';
        }

        // --- NEW TABS & ORDERS LOGIC ---

        function switchTab(tab) {
            const menuTab = document.getElementById('tab-menu');
            const ordersTab = document.getElementById('tab-orders');
            const menuSection = document.getElementById('section-menu');
            const ordersSection = document.getElementById('section-orders');

            if (tab === 'menu') {
                menuTab.classList.replace('text-slate-400', 'text-[#8d5a30]');
                menuTab.children[0].classList.replace('bg-transparent', 'bg-[#8d5a30]');
                ordersTab.classList.replace('text-[#8d5a30]', 'text-slate-400');
                ordersTab.children[0].classList.replace('bg-[#8d5a30]', 'bg-transparent');

                menuSection.classList.remove('hidden');
                menuSection.classList.add('block');
                ordersSection.classList.remove('block');
                ordersSection.classList.add('hidden');
            } else {
                ordersTab.classList.replace('text-slate-400', 'text-[#8d5a30]');
                ordersTab.children[0].classList.replace('bg-transparent', 'bg-[#8d5a30]');
                menuTab.classList.replace('text-[#8d5a30]', 'text-slate-400');
                menuTab.children[0].classList.replace('bg-[#8d5a30]', 'bg-transparent');

                ordersSection.classList.remove('hidden');
                ordersSection.classList.add('block');
                menuSection.classList.remove('block');
                menuSection.classList.add('hidden');

                loadOrders(); // Auto load when switching
            }
        }

        async function loadOrders() {
            const ordersList = document.getElementById('orders-list');
            ordersList.innerHTML = '<div class="text-center py-10 opacity-50 font-bold text-sm">Analyzing order data...</div>';

            const yesterday = new Date();
            yesterday.setHours(yesterday.getHours() - 24);
            const yesterdayIso = yesterday.toISOString();

            const { data, error } = await supabaseClient
                .from('orders')
                .select('*')
                .gte('created_at', yesterdayIso)
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Error fetching orders:", error);
                ordersList.innerHTML = `<div class="text-center py-10 text-red-500 font-bold text-sm">Failed to fetch orders: ${error.message}</div>`;
                return;
            }

            if (!data || data.length === 0) {
                ordersList.innerHTML = `
                    <div class="bg-white p-10 rounded-3xl border border-black/5 text-center flex flex-col items-center justify-center">
                        <span class="material-symbols-outlined text-4xl text-slate-300 mb-2">inbox</span>
                        <p class="font-bold text-slate-500">No orders placed in the last 24 hours.</p>
                    </div>`;
                return;
            }

            ordersList.innerHTML = data.map((order) => {
                const date = new Date(order.created_at);
                const timeString = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const dateString = date.toLocaleDateString();

                let itemsHtml = '';
                if (order.items && Array.isArray(order.items)) {
                    itemsHtml = order.items.map(i => `<li class="flex justify-between text-sm py-1 border-b border-black/[0.03] last:border-0"><span>${i.quantity}x <span class="font-bold">${i.name}</span></span><span class="text-slate-500">₹${i.price * i.quantity}</span></li>`).join('');
                }

                // Color code status tag
                let statusColor = 'bg-yellow-100 text-yellow-700'; // received
                if (order.status === 'delivered') statusColor = 'bg-green-100 text-green-700';
                if (order.status === 'baking' || order.status === 'processing') statusColor = 'bg-blue-100 text-blue-700';

                return `
                    <div class="bg-white p-6 rounded-3xl border border-black/5 shadow-sm">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h4 class="font-black text-lg">${order.customer_name}</h4>
                                <div class="flex items-center gap-2 mt-1">
                                    <span class="material-symbols-outlined text-[14px] text-slate-400">call</span>
                                    <p class="text-xs font-bold text-slate-500">${order.phone}</p>
                                </div>
                                <div class="flex items-start gap-2 mt-1">
                                    <span class="material-symbols-outlined text-[14px] text-slate-400">location_on</span>
                                    <p class="text-xs text-slate-500 leading-tight max-w-[200px]">${order.address}</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <span class="px-3 py-1 text-[10px] font-black uppercase tracking-widest rounded-full ${statusColor}">${order.status}</span>
                                <p class="text-[10px] text-slate-400 font-bold mt-2 uppercase tracking-widest">${timeString} • ${dateString}</p>
                            </div>
                        </div>

                        <div class="bg-[#f8f7f6] rounded-2xl p-4 mb-4">
                            <h5 class="text-[10px] font-black uppercase tracking-widest text-[#8d5a30] mb-3">Order Formulation</h5>
                            <ul class="flex flex-col gap-1">
                                ${itemsHtml}
                            </ul>
                            <div class="flex justify-between items-center mt-3 pt-3 border-t border-black/5">
                                <span class="font-bold text-sm text-slate-500">Total Charged</span>
                                <span class="font-black text-lg text-primary">₹${order.total_amount}</span>
                            </div>
                        </div>

                        <div class="flex gap-2 justify-end">
                            <button onclick="updateOrderStatus('${order.id}', 'processing')" class="px-4 py-2 bg-blue-50 text-blue-600 rounded-xl font-bold text-[10px] uppercase tracking-widest hover:bg-blue-100 transition-colors">Accept / Process</button>
                            <button onclick="updateOrderStatus('${order.id}', 'delivered')" class="px-4 py-2 bg-green-50 text-green-600 rounded-xl font-bold text-[10px] uppercase tracking-widest hover:bg-green-100 transition-colors">Mark Delivered</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function updateOrderStatus(orderId, newStatus) {
            const { error } = await window.supabaseClient
                .from('orders')
                .update({ status: newStatus })
                .eq('id', orderId);

            if (error) {
                alert("Failed to update status: " + error.message);
            } else {
                loadOrders(); // refresh view
            }
        }

        loadMenu();

    </script>
</body>

</html>
