<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - The Waffle Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>

<body class="bg-[#f8f7f6] text-slate-900 min-h-screen pb-24">
    <header
        class="sticky top-0 z-50 bg-white/80 backdrop-blur-md px-6 py-4 border-b border-black/5 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black italic tracking-tighter">LAB DASHBOARD</h1>
            <p class="text-[10px] font-bold text-[#8d5a30] uppercase">Management Console</p>
        </div>
        <button onclick="logout()" class="text-red-500 font-bold text-xs uppercase tracking-widest">Logout</button>
    </header>

    <main class="max-w-4xl mx-auto p-6">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black">Menu Items</h2>
            <button onclick="openModal()"
                class="bg-[#8d5a30] text-white px-6 py-3 rounded-2xl font-black text-xs shadow-lg shadow-[#8d5a30]/20 flex items-center gap-2">
                <span class="material-symbols-outlined text-sm">add</span>
                ADD NEW ITEM
            </button>
        </div>

        <div id="items-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Items will be injected here -->
        </div>
    </main>

    <!-- Modal -->
    <div id="modal"
        class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-6">
        <div class="w-full max-w-lg bg-white rounded-[2.5rem] p-8 shadow-2xl relative">
            <button onclick="closeModal()"
                class="absolute top-6 right-6 text-slate-400 hover:text-slate-900 transition-colors">
                <span class="material-symbols-outlined">close</span>
            </button>

            <h3 id="modal-title" class="text-2xl font-black mb-6 italic">ADD ITEM</h3>

            <form id="item-form" class="space-y-4">
                <input type="hidden" id="edit-id">
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-[#8d5a30] mb-2">Item
                        Name</label>
                    <input type="text" id="name" required
                        class="w-full bg-[#f8f7f6] border-none rounded-2xl px-5 py-4 focus:ring-2 focus:ring-[#8d5a30]/20 transition-all font-medium">
                </div>

                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="block text-[10px] font-black uppercase tracking-widest text-[#8d5a30] mb-2">Price
                            (₹)</label>
                        <input type="number" id="price" required
                            class="w-full bg-[#f8f7f6] border-none rounded-2xl px-5 py-4 focus:ring-2 focus:ring-[#8d5a30]/20 transition-all font-medium">
                    </div>
                    <div>
                        <label
                            class="block text-[10px] font-black uppercase tracking-widest text-[#8d5a30] mb-2">Category</label>
                        <select id="category"
                            class="w-full bg-[#f8f7f6] border-none rounded-2xl px-5 py-4 focus:ring-2 focus:ring-[#8d5a30]/20 transition-all font-medium">
                            <option value="waffle">Waffle</option>
                            <option value="cake">Cake</option>
                            <option value="brownie">Brownie</option>
                        </select>
                    </div>
                    <div>
                        <label
                            class="block text-[10px] font-black uppercase tracking-widest text-[#8d5a30] mb-2">Flavor</label>
                        <select id="flavor"
                            class="w-full bg-[#f8f7f6] border-none rounded-2xl px-5 py-4 focus:ring-2 focus:ring-[#8d5a30]/20 transition-all font-medium">
                            <option value="classic">Classic</option>
                            <option value="dark">Dark</option>
                            <option value="milk">Milk</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-[#8d5a30] mb-2">Image
                        URL</label>
                    <input type="url" id="img" required
                        class="w-full bg-[#f8f7f6] border-none rounded-2xl px-5 py-4 focus:ring-2 focus:ring-[#8d5a30]/20 transition-all font-medium">
                </div>
                <div>
                    <label
                        class="block text-[10px] font-black uppercase tracking-widest text-[#8d5a30] mb-2">Description</label>
                    <textarea id="desc" required
                        class="w-full bg-[#f8f7f6] border-none rounded-2xl px-5 py-4 focus:ring-2 focus:ring-[#8d5a30]/20 transition-all font-medium h-24"></textarea>
                </div>

                <button type="submit"
                    class="w-full py-5 bg-[#8d5a30] text-white rounded-2xl font-black text-sm shadow-xl shadow-[#8d5a30]/20 active:scale-95 transition-transform mt-4">
                    SAVE CHANGES
                </button>
            </form>
        </div>
    </div>

    <script>
        if (localStorage.getItem('isAdmin') !== 'true') window.location.href = 'admin.html';

        let menuItems = [];

        async function loadMenu() {
            const res = await fetch('/api/menu');
            menuItems = await res.json();
            const grid = document.getElementById('items-grid');

            grid.innerHTML = menuItems.map((item) => `
                <div class="bg-white p-4 rounded-3xl border border-black/5 flex gap-4 items-center shadow-sm hover:shadow-md transition-shadow">
                    <img src="${item.img}" class="size-20 rounded-2xl object-cover shrink-0">
                    <div class="flex-1 min-w-0">
                        <h4 class="font-black text-sm truncate">${item.name}</h4>
                        <p class="text-[#8d5a30] font-bold text-xs">₹${item.price}</p>
                        <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">${item.category}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="openModal('${item.id}')" class="bg-blue-50 text-blue-500 size-10 rounded-xl flex items-center justify-center">
                            <span class="material-symbols-outlined text-base">edit</span>
                        </button>
                        <button onclick="deleteItem('${item.id}')" class="bg-red-50 text-red-500 size-10 rounded-xl flex items-center justify-center">
                            <span class="material-symbols-outlined text-base">delete</span>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function openModal(id = null) {
            const modal = document.getElementById('modal');
            const item = id ? menuItems.find(i => i.id === id) : null;
            modal.classList.remove('hidden');

            if (item) {
                document.getElementById('edit-id').value = item.id;
                document.getElementById('name').value = item.name;
                document.getElementById('img').value = item.img;
                document.getElementById('desc').value = item.desc;
                document.getElementById('price').value = item.price;
                document.getElementById('category').value = item.category;
                document.getElementById('flavor').value = item.flavor || 'classic';
                document.getElementById('modal-title').innerText = 'EDIT ITEM';
            } else {
                document.getElementById('item-form').reset();
                document.getElementById('edit-id').value = '';
                document.getElementById('modal-title').innerText = 'ADD ITEM';
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        document.getElementById('item-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const data = {
                id: id || 'item-' + Date.now(),
                name: document.getElementById('name').value,
                img: document.getElementById('img').value,
                desc: document.getElementById('desc').value,
                price: parseFloat(document.getElementById('price').value),
                category: document.getElementById('category').value,
                flavor: document.getElementById('flavor').value
            };

            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/menu/${id}` : '/api/menu';

            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                closeModal();
                loadMenu();
            }
        });

        async function deleteItem(id) {
            if (confirm(`Are you sure you want to remove this item?`)) {
                const res = await fetch(`/api/menu/${id}`, { method: 'DELETE' });
                if (res.ok) loadMenu();
            }
        }

        function logout() {
            localStorage.removeItem('isAdmin');
            window.location.href = 'admin.html';
        }

        loadMenu();
    </script>
</body>

</html>
